name: Branch Push Validation

on:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/pull/')
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.16.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate formatting rules
        run: npm run prettier

      - name: Comprehensive linting, fail on warning
        run: npm run lint:strict

      - name: Validate TypeScript build
        run: npx tsc --noEmit
